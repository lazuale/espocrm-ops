name: espocrm

x-espocrm-env: &espocrm_env
  ESPOCRM_DATABASE_PLATFORM: Mysql
  ESPOCRM_DATABASE_HOST: db
  ESPOCRM_DATABASE_NAME: ${DB_NAME}
  ESPOCRM_DATABASE_USER: ${DB_USER}
  ESPOCRM_DATABASE_PASSWORD: ${DB_PASSWORD}
  ESPOCRM_CONFIG_DATABASE_HOST: db
  ESPOCRM_CONFIG_DATABASE_DBNAME: ${DB_NAME}
  ESPOCRM_CONFIG_DATABASE_USER: ${DB_USER}
  ESPOCRM_CONFIG_DATABASE_PASSWORD: ${DB_PASSWORD}

services:
  db:
    image: mariadb:11.4
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - db-data:/var/lib/mysql
      - ./deploy/mariadb/z-custom.cnf:/etc/mysql/conf.d/z-custom.cnf:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  espocrm:
    image: espocrm/espocrm:9.3.4-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *espocrm_env
    volumes:
      - ${ESPO_STORAGE_DIR}:/var/www/html
      - ./deploy/php/espocrm.ini:/usr/local/etc/php/conf.d/99-espocrm-local.ini:ro
      - ./deploy/apache/zzz-espo-tuning.conf:/etc/apache2/conf-enabled/zzz-espo-tuning.conf:ro
    ports:
      - "127.0.0.1:8080:80"
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$ctx=stream_context_create([\"http\"=>[\"timeout\"=>3,\"ignore_errors\"=>true]]); @file_get_contents(\"http://127.0.0.1/\",false,$$ctx); $$h=$$http_response_header[0]??\"\"; if(!preg_match(\"/^HTTP\\/\\S+ [23][0-9][0-9]/\",$$h)){exit(1);}' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  espocrm-daemon:
    image: espocrm/espocrm:9.3.4-apache
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      espocrm:
        condition: service_healthy
    entrypoint: docker-daemon.sh
    environment:
      <<: *espocrm_env
    volumes:
      - ${ESPO_STORAGE_DIR}:/var/www/html
      - ./deploy/php/espocrm.ini:/usr/local/etc/php/conf.d/99-espocrm-local.ini:ro
    healthcheck:
      test: ["CMD-SHELL", "ps -eo args | grep -q '[d]aemon\\.php'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  db-data:
