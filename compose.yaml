name: ${COMPOSE_PROJECT_NAME}

x-espocrm-runtime-env: &espocrm_runtime_env
  # Keep all application containers on one runtime contract.
  ESPOCRM_DATABASE_PLATFORM: Mysql
  ESPOCRM_DATABASE_HOST: db
  ESPOCRM_DATABASE_NAME: ${DB_NAME}
  ESPOCRM_DATABASE_USER: ${DB_USER}
  ESPOCRM_DATABASE_PASSWORD: ${DB_PASSWORD}
  ESPOCRM_SITE_URL: ${SITE_URL}
  ESPOCRM_CONFIG_SITE_URL: ${SITE_URL}
  ESPOCRM_CONFIG_DATABASE_HOST: db
  ESPOCRM_CONFIG_DATABASE_DBNAME: ${DB_NAME}
  ESPOCRM_CONFIG_DATABASE_USER: ${DB_USER}
  ESPOCRM_CONFIG_DATABASE_PASSWORD: ${DB_PASSWORD}
  ESPOCRM_CONFIG_DEFAULT_LANGUAGE: ${ESPO_DEFAULT_LANGUAGE}
  ESPOCRM_CONFIG_TIME_ZONE: ${ESPO_TIME_ZONE}
  ESPOCRM_CONFIG_LOGGER_LEVEL: ${ESPO_LOGGER_LEVEL}

services:
  db:
    image: mariadb:${MARIADB_TAG}
    restart: unless-stopped
    mem_limit: ${DB_MEM_LIMIT}
    cpus: ${DB_CPUS}
    pids_limit: ${DB_PIDS_LIMIT}
    stop_grace_period: 1m30s
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE}"
        max-file: "${DOCKER_LOG_MAX_FILE}"
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: ${DB_NAME}
      MARIADB_USER: ${DB_USER}
      MARIADB_PASSWORD: ${DB_PASSWORD}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-file-per-table=1
      - --max-allowed-packet=64MB
    volumes:
      - "${DB_STORAGE_DIR}:/var/lib/mysql"
      - "./deploy/mariadb/z-custom.cnf:/etc/mysql/conf.d/z-custom.cnf:ro"
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  espocrm:
    image: ${ESPOCRM_IMAGE}
    restart: unless-stopped
    mem_limit: ${ESPO_MEM_LIMIT}
    cpus: ${ESPO_CPUS}
    pids_limit: ${ESPO_PIDS_LIMIT}
    stop_grace_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE}"
        max-file: "${DOCKER_LOG_MAX_FILE}"
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *espocrm_runtime_env
      ESPOCRM_ADMIN_USERNAME: ${ADMIN_USERNAME}
      ESPOCRM_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    volumes:
      - "${ESPO_STORAGE_DIR}:/var/www/html"
      - "./deploy/php/espocrm.ini:/usr/local/etc/php/conf.d/99-espocrm-local.ini:ro"
      - "./deploy/apache/zzz-espo-tuning.conf:/etc/apache2/conf-enabled/zzz-espo-tuning.conf:ro"
    ports:
      - "${APP_BIND_ADDRESS}:${APP_PORT}:80"
    healthcheck:
      # Escape `$` as `$$` so Compose does not rewrite the probe.
      test: ["CMD-SHELL", "php -r '$$s=@fsockopen(\"127.0.0.1\",80,$$e,$$es,2); if(!$$s){exit(1);} fclose($$s);' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  espocrm-daemon:
    image: ${ESPOCRM_IMAGE}
    restart: unless-stopped
    mem_limit: ${DAEMON_MEM_LIMIT}
    cpus: ${DAEMON_CPUS}
    pids_limit: ${DAEMON_PIDS_LIMIT}
    stop_grace_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE}"
        max-file: "${DOCKER_LOG_MAX_FILE}"
    depends_on:
      db:
        condition: service_healthy
      espocrm:
        condition: service_healthy
    # Wait for the web container too, or first install can loop pointlessly.
    entrypoint: docker-daemon.sh
    environment:
      <<: *espocrm_runtime_env
    volumes:
      - "${ESPO_STORAGE_DIR}:/var/www/html"
      - "./deploy/php/espocrm.ini:/usr/local/etc/php/conf.d/99-espocrm-local.ini:ro"
    healthcheck:
      test: ["CMD-SHELL", "ps -eo args | grep -q '[d]aemon\\.php'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  espocrm-websocket:
    image: ${ESPOCRM_IMAGE}
    restart: unless-stopped
    mem_limit: ${WS_MEM_LIMIT}
    cpus: ${WS_CPUS}
    pids_limit: ${WS_PIDS_LIMIT}
    stop_grace_period: 45s
    logging:
      driver: json-file
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE}"
        max-file: "${DOCKER_LOG_MAX_FILE}"
    depends_on:
      db:
        condition: service_healthy
      espocrm:
        condition: service_healthy
    # Wait for the web container too, or first install can loop pointlessly.
    entrypoint: docker-websocket.sh
    environment:
      <<: *espocrm_runtime_env
      ESPOCRM_CONFIG_USE_WEB_SOCKET: "true"
      ESPOCRM_CONFIG_WEB_SOCKET_URL: ${WS_PUBLIC_URL}
      ESPOCRM_CONFIG_WEB_SOCKET_ZERO_M_Q_SUBSCRIBER_DSN: "tcp://*:7777"
      ESPOCRM_CONFIG_WEB_SOCKET_ZERO_M_Q_SUBMISSION_DSN: "tcp://espocrm-websocket:7777"
    volumes:
      - "${ESPO_STORAGE_DIR}:/var/www/html"
      - "./deploy/php/espocrm.ini:/usr/local/etc/php/conf.d/99-espocrm-local.ini:ro"
    ports:
      - "${WS_BIND_ADDRESS}:${WS_PORT}:8080"
    healthcheck:
      test: ["CMD-SHELL", "php -r '$$s=@fsockopen(\"127.0.0.1\",8080,$$e,$$es,2); if(!$$s){exit(1);} fclose($$s);' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
