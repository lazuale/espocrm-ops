name: Go CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-health:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install health tools
        run: make install-ci-health-tools

      - name: Add health tools to PATH
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Build
        run: make build

      - name: Verify Go Modules
        run: go mod verify

      - name: Run Unit Tests
        run: go test ./...

      - name: Run Readonly Tests
        run: go test -mod=readonly ./...

      - name: Run Race Tests
        run: go test -race ./...

      - name: Run Go Vet
        run: go vet ./...

      - name: Run Staticcheck
        run: staticcheck ./...

      - name: Run GolangCI-Lint
        run: golangci-lint run --no-config ./...

      - name: Verify Module Files Stay Clean
        run: git diff --exit-code -- go.mod go.sum

  docker-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify Docker Daemon
        run: docker info

      - name: Verify Docker Compose Plugin
        run: docker compose version

      - name: Run Docker Integration Tests
        run: make integration
