name: Go CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci-fast:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install health tools
        run: make install-ci-health-tools

      - name: Add health tools to PATH
        run: echo "$HOME/go/bin" >> "$GITHUB_PATH"

      - name: Run Fast CI
        run: make ci-fast

  docker-integration:
    if: github.event_name != 'pull_request'
    needs: ci-fast
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Docker Integration CI
        run: make ci-integration
