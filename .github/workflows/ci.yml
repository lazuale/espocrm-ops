name: Go CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  go-core:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HEALTH_TOOLS_BIN: ${{ runner.temp }}/go-bin
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install health tools
        run: make install-ci-health-tools

      - name: Add health tools to PATH
        run: echo "${HEALTH_TOOLS_BIN}" >> "$GITHUB_PATH"

      - name: Run Go CI
        run: make ci
