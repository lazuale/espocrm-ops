name: Merge Gate

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  merge-gate:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
      HEALTH_TOOLS_BIN: ${{ runner.temp }}/go-bin
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install shellcheck
        run: |
          set -Eeuo pipefail
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends shellcheck

      - name: Install Go health tools
        run: |
          set -Eeuo pipefail
          make install-ci-health-tools

      - name: Add Go health tools to PATH
        run: |
          set -Eeuo pipefail
          echo "${HEALTH_TOOLS_BIN}" >> "$GITHUB_PATH"

      - name: Run full health gate
        run: |
          set -Eeuo pipefail
          make check-full
