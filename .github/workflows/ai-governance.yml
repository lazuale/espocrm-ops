name: Go CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  go-core:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      HEALTH_TOOLS_BIN: ${{ runner.temp }}/go-bin
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Go health tools
        run: |
          set -Eeuo pipefail
          make install-ci-health-tools

      - name: Add Go health tools to PATH
        run: |
          set -Eeuo pipefail
          echo "${HEALTH_TOOLS_BIN}" >> "$GITHUB_PATH"

      - name: Run Go CI
        run: |
          set -Eeuo pipefail
          make ci
