; Memory limit for EspoCRM PHP processes.
memory_limit=256M

; Maximum execution time for a single request.
max_execution_time=180

; Maximum input parsing time.
max_input_time=180

; Maximum POST body size.
post_max_size=30M

; Maximum uploaded file size.
upload_max_filesize=30M

; Do not show errors in the browser in prod.
display_errors=Off

; Do not show startup errors to the user either.
display_startup_errors=Off

; Keep error logging enabled.
log_errors=On

; Default application time zone.
date.timezone=Europe/Moscow
