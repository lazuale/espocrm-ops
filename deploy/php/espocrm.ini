; Лимит памяти для PHP-процессов EspoCRM.
memory_limit=256M

; Максимальное время выполнения одного запроса.
max_execution_time=180

; Максимальное время разбора входных данных.
max_input_time=180

; Максимальный размер POST-запроса.
post_max_size=30M

; Максимальный размер загружаемого файла.
upload_max_filesize=30M

; В проде ошибки в браузер не выводим.
display_errors=Off

; Ошибки старта тоже не показываем пользователю.
display_startup_errors=Off

; Но логирование ошибок включаем.
log_errors=On

; Базовый часовой пояс приложения.
date.timezone=Europe/Moscow
