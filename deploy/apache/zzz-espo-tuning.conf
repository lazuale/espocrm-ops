# Не светим точную версию Apache наружу.
ServerTokens Prod

# Убираем подпись сервера из служебных страниц.
ServerSignature Off

# Отключаем TRACE как лишний HTTP-метод.
TraceEnable Off

# KeepAlive оставляем включенным для нормальной работы браузера.
KeepAlive On

# Ограничиваем количество запросов в одном keep-alive соединении.
MaxKeepAliveRequests 100

# Держим соединение недолго, чтобы не тратить лишние ресурсы.
KeepAliveTimeout 2

# Общий таймаут обработки запросов.
Timeout 60
