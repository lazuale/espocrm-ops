# Do not expose the exact Apache version.
ServerTokens Prod

# Remove the server signature from built-in pages.
ServerSignature Off

# Disable TRACE as an unnecessary HTTP method.
TraceEnable Off

# KeepAlive stays enabled for normal browser behavior.
KeepAlive On

# Limit the number of requests per keep-alive connection.
MaxKeepAliveRequests 100

# Keep the connection short-lived to avoid wasting resources.
KeepAliveTimeout 2

# Global request processing timeout.
Timeout 60
